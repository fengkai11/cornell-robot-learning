name: Normalize short display math

on:
  create:

permissions:
  contents: write

jobs:
  normalize:
    if: github.ref_type == 'branch' && github.ref == 'normalize-short-display-math-trigger'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Normalize short display math and update constraints
        shell: python
        run: |
          from pathlib import Path

          lecture_dir = Path("01-lectures/L02-fundamentals-of-robotic-control")
          constraints_path = Path("resources/markdown-writing-constraints.md")
          workflow_path = Path(".github/workflows/normalize-short-display-math.yml")

          structured_markers = (
              r"\begin{aligned}",
              r"\begin{alignedat}",
              r"\begin{array}",
              r"\begin{cases}",
              r"\begin{matrix}",
              r"\begin{pmatrix}",
              r"\begin{bmatrix}",
              r"\begin{vmatrix}",
              r"\begin{Vmatrix}",
              r"\begin{gathered}",
              r"\begin{split}",
          )

          def normalize_display_math(text: str) -> tuple[str, int]:
              lines = text.splitlines()
              output: list[str] = []
              changes = 0
              i = 0

              while i < len(lines):
                  if lines[i].strip() != "$$":
                      output.append(lines[i])
                      i += 1
                      continue

                  end = i + 1
                  while end < len(lines) and lines[end].strip() != "$$":
                      end += 1

                  if end >= len(lines):
                      output.extend(lines[i:])
                      break

                  body = lines[i + 1 : end]
                  body_text = "\n".join(body)
                  significant = [line.strip() for line in body if line.strip()]
                  is_structured = any(marker in body_text for marker in structured_markers)

                  output.append(lines[i])
                  if not is_structured and len(significant) > 1:
                      output.append(" ".join(significant))
                      changes += 1
                  else:
                      output.extend(body)
                  output.append(lines[end])
                  i = end + 1

              normalized = "\n".join(output)
              if text.endswith("\n"):
                  normalized += "\n"
              return normalized, changes

          total_changes = 0
          for path in sorted(lecture_dir.rglob("*.md")):
              original = path.read_text(encoding="utf-8")
              normalized, changes = normalize_display_math(original)
              if normalized != original:
                  path.write_text(normalized, encoding="utf-8")
                  total_changes += changes
                  print(f"normalized {changes} formula block(s): {path}")

          constraints = constraints_path.read_text(encoding="utf-8")
          marker = "### 1.2.1 短公式正文必须单行"
          if marker not in constraints:
              anchor = "公式块前后各保留一个空行。\n"
              addition = r'''

### 1.2.1 短公式正文必须单行

对于不需要 `aligned`、`cases`、`array` 等结构化环境的普通独立公式，`$$` 起止符仍各自独占一行，但公式正文必须写在同一个源码行中。

正确写法：

```markdown
$$
e_\theta = \operatorname{wrapToPi}(\theta_d-\theta).
$$
```

禁止为了视觉对齐，把左侧变量、等号和右侧表达式拆成多个普通源码行：

```markdown
$$
e_\theta
=
\operatorname{wrapToPi}(\theta_d-\theta).
$$
```

原始换行不等于数学换行。确实需要多行推导时，必须显式使用 `aligned` 等环境，并用 `\\` 标记数学换行；不要依赖公式块中的普通换行控制布局。
'''
              if anchor not in constraints:
                  raise RuntimeError("Could not find formula-block anchor in constraints file")
              constraints = constraints.replace(anchor, anchor + addition, 1)

          old_checklist = """1. 是否残留独立的 `\\[` 或 `\\]`；
2. 所有 `$$` 是否成对出现；
3. 公式块前后是否留有空行；
4. 表格中的公式是否过于复杂；
5. Mermaid 是否能在 GitHub 网页端渲染；
6. 文档内部链接是否有效。"""
          new_checklist = """1. 是否残留独立的 `\\[` 或 `\\]`；
2. 所有 `$$` 是否成对出现；
3. 公式块前后是否留有空行；
4. 非结构化独立公式的正文是否保持单行；
5. 表格中的公式是否过于复杂；
6. Mermaid 是否能在 GitHub 网页端渲染；
7. 文档内部链接是否有效。"""
          if old_checklist in constraints:
              constraints = constraints.replace(old_checklist, new_checklist, 1)
          elif "4. 非结构化独立公式的正文是否保持单行；" not in constraints:
              raise RuntimeError("Could not update pre-commit checklist")

          constraints_path.write_text(constraints, encoding="utf-8")
          workflow_path.unlink()
          print(f"normalized total formula blocks: {total_changes}")

      - name: Commit normalized Markdown
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 01-lectures/L02-fundamentals-of-robotic-control resources/markdown-writing-constraints.md .github/workflows/normalize-short-display-math.yml
          git commit -m "Normalize short display math blocks"
          git push origin main
          git push origin --delete normalize-short-display-math-trigger || true
